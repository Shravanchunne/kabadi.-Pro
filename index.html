<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KabadiPro</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #000;
  color: white;
}

/* FADE IN ANIMATION */
@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

/* HEADER */
header {
  text-align: center;
  padding: 20px;
  animation: fadeIn 1s ease;
}

.logo {
  width: 130px;
  border-radius: 50%;
  box-shadow: 0 0 20px gold;
  transition: 0.4s;
}

.logo:hover {
  transform: scale(1.1) rotate(5deg);
}

/* BANNER */
.banner {
  width: 100%;
  margin-top: 15px;
  border-radius: 12px;
  transition: 0.4s;
}

.banner:hover {
  transform: scale(1.03);
}

/* TAGLINE */
.tagline {
  color: gold;
  margin-top: 10px;
  font-weight: bold;
  animation: fadeIn 2s;
}

/* CARD */
.card {
  background: #111;
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 0 15px rgba(255,215,0,0.2);
  animation: fadeIn 1.5s;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 25px rgba(255,215,0,0.4);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.item {
  background: #000;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
  transition: 0.3s;
}

.item:hover {
  background: gold;
  color: black;
  transform: scale(1.05);
}

/* INPUT */
input {
  width: 80%;
  margin-top: 5px;
  padding: 6px;
  border-radius: 6px;
  border: none;
}

/* BUTTON */
button {
  background: gold;
  color: black;
  border: none;
  padding: 12px;
  border-radius: 10px;
  width: 100%;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  background: #ffd700;
  transform: scale(1.05);
}

/* WHATSAPP FLOAT */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 15px;
  border-radius: 50%;
  font-size: 22px;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% {box-shadow:0 0 0 0 rgba(37,211,102,0.7);}
  70% {box-shadow:0 0 0 15px rgba(37,211,102,0);}
  100% {box-shadow:0 0 0 0 rgba(37,211,102,0);}
}

iframe {
  width: 100%;
  height: 250px;
  border-radius: 12px;
  border: none;
}

</style>
</head>

<body>

<header>
  <img src="logo.png" class="logo">
  <div class="tagline">Scrap Ka Sathi, Bharose Ka Vyapari ♻️</div>
  <img src="banner.jpg" class="banner">
</header>

<div class="card">
  <h3 style="color:gold;">Scrap Prices 💰</h3>

  <div class="grid">
    <div class="item">Iron<br><input id="iron" value="25"></div>
    <div class="item">Plastic<br><input id="plastic" value="10"></div>
    <div class="item">Paper<br><input id="paper" value="12"></div>
    <div class="item">Aluminium<br><input id="aluminium" value="80"></div>
  </div>
</div>

<div class="card">
  <h3 style="color:gold;">Book Pickup 📦</h3>

  <input id="name" placeholder="Name"><br><br>
  <input id="phone" placeholder="Phone"><br><br>
  <input id="address" placeholder="Address"><br><br>

  <button onclick="send()">Book Now</button>
</div>

<div class="card">
  <h3 style="color:gold;">Location 📍</h3>

  <iframe src="https://maps.google.com/maps?q=Wasera%20Sindewahi&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
</div>

<div class="whatsapp" onclick="send()">💬</div>

<script>
function send(){
  var name=document.getElementById("name").value;
  var phone=document.getElementById("phone").value;
  var address=document.getElementById("address").value;

  var msg="Scrap Pickup:%0AName:"+name+"%0APhone:"+phone+"%0AAddress:"+address;

  window.open("https://wa.me/917218300521?text="+msg);
}
</script>

</body>
</html>
