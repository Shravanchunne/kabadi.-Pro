<!DOCTYPE html>
<html>
<head>
  <title>KabadiPro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
    }

    body::before {
      content: "CHUNNE KABADI";
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 60px;
      color: rgba(255,215,0,0.05);
      font-weight: bold;
      z-index: -1;
    }

    header {
      text-align: center;
      padding: 15px;
      background: #111;
      box-shadow: 0 0 25px rgba(255,215,0,0.3);
    }

    .logo { width: 200px; border-radius: 12px; box-shadow: 0 0 20px gold; }
    .banner { width: 100%; margin-top: 10px; border-radius: 10px; }

    .tagline { color: gold; font-weight: bold; }

    .container { padding: 15px; }

    .card {
      background: #111;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 0 15px rgba(255,215,0,0.2);
    }

    h2 { color: gold; }

    table { width: 100%; }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 6px;
      border: none;
      background: #222;
      color: white;
    }

    button {
      background: gold;
      color: black;
      padding: 10px;
      border: none;
      border-radius: 8px;
      margin-top: 10px;
      width: 100%;
      font-weight: bold;
    }

    iframe {
      width: 100%;
      height: 250px;
      border-radius: 10px;
      border: none;
    }

    .admin {
      display: none;
    }
  </style>
</head>

<body>

<header>
  <img src="logo.png" class="logo">
  <div class="tagline">Scrap Ka Sathi, Bharose Ka Vyapari ♻️</div>
  <div>Owner: <span style="color:gold;">Shyam Chunne</span></div>
  <img src="banner.jpg" class="banner">
</header>

<div class="container">

  <!-- PRICE TABLE -->
  <div class="card">
    <h2>Scrap Price List 💰</h2>

    <table>
      <tr><td>Iron</td><td><input id="iron" value="25"></td></tr>
      <tr><td>Plastic</td><td><input id="plastic" value="10"></td></tr>
      <tr><td>Paper</td><td><input id="paper" value="12"></td></tr>
      <tr><td>Aluminium</td><td><input id="aluminium" value="80"></td></tr>
    </table>
  </div>

  <!-- BOOKING -->
  <div class="card">
    <h2>Book Scrap Pickup 📦</h2>

    <input type="text" id="name" placeholder="Your Name">
    <input type="text" id="phone" placeholder="Phone Number">
    <input type="text" id="address" placeholder="Address">

    <button onclick="sendWhatsApp()">Book Now</button>
  </div>

  <!-- GOOGLE MAP -->
  <div class="card">
    <h2>Our Location 📍</h2>

    <iframe src="https://maps.google.com/maps?q=Wasera%20Sindewahi&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
  </div>

  <!-- ADMIN LOGIN -->
  <div class="card">
    <h2>Admin Panel 🔒</h2>

    <input type="password" id="adminPass" placeholder="Enter Password">
    <button onclick="login()">Login</button>

    <div id="adminPanel" class="admin">
      <h3 style="color:gold;">Edit Prices</h3>
      <button onclick="savePrices()">Save Prices</button>
    </div>
  </div>

</div>

<script>
function sendWhatsApp() {
  var name = document.getElementById("name").value;
  var phone = document.getElementById("phone").value;
  var address = document.getElementById("address").value;

  var msg = "Scrap Pickup Request:%0A"
    + "Name: " + name + "%0A"
    + "Phone: " + phone + "%0A"
    + "Address: " + address;

  window.open("https://wa.me/917218300521?text=" + msg);
}

function login() {
  var pass = document.getElementById("adminPass").value;

  if(pass === "1234") {
    document.getElementById("adminPanel").style.display = "block";
    alert("Login Success");
  } else {
    alert("Wrong Password");
  }
}

function savePrices() {
  alert("Prices Updated Successfully ✅");
}
</script>

</body>
</html>
